name: fuelkeeper
description: "FuelKeeper - real-time gas station price comparison and fuel ledger"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  shared_preferences: ^2.5.5
  geolocator: ^14.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.3
  intl: ^0.20.2
  flutter_naver_map: ^1.4.4
  dio: ^5.9.2
  proj4dart: ^3.0.0
  geocoding: ^4.0.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/PretendardVariable.ttf

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#1A3FAA"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
